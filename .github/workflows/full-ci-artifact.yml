name: Full CI with Artifact

on:
  push:
    branches:
      - main
      - feature/*
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building the app..."
          echo "Build complete!"

      - name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-build
          path: .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run tests
        run: |
          echo "Running tests..."
          echo "All tests passed!"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy
        run: |
          echo "Deploying the app..."
          echo "App is live!"
