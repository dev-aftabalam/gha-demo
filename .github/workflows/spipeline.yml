name: Scheduled Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:

  daily-check:
    runs-on: ubuntu-latest

    steps:

      - name: Good morning message
        run: echo "Good morning! Pipeline is running..."

      - name: Check application health
        run: |
          echo "Checking application health..."
          echo "Database     : OK"
          echo "API Server   : OK"
          echo "File Storage : OK"
          echo "All systems healthy!"

      - name: Run tests
        run: |
          echo "Running tests..."
          echo "Test 1 : PASSED"
          echo "Test 2 : PASSED"
          echo "Test 3 : PASSED"
          echo "All tests complete!"

      - name: Finish
        run: |
          echo "Pipeline finished at $(date)"
          echo "Branch = ${{ github.ref_name }}"